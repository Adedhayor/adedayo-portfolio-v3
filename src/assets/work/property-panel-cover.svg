<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="Property Panel redesign">
  <rect width="1600" height="1000" fill="#111111"/>
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="250" x2="1600" y2="250"/>
    <line x1="0" y1="500" x2="1600" y2="500"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
  </g>
  <text x="120" y="150" fill="#f5f3ef" fill-opacity="0.5" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" letter-spacing="6" font-weight="500">EDITOR INSPECTOR · REPLIKIT</text>
  <text x="116" y="520" fill="#f5f3ef" font-family="Georgia, 'Times New Roman', serif" font-size="150" font-weight="600" letter-spacing="-4">Property</text>
  <text x="116" y="670" fill="#f5f3ef" font-family="Georgia, 'Times New Roman', serif" font-size="150" font-weight="600" letter-spacing="-4">Panel</text>
  <text x="120" y="800" fill="#f5f3ef" fill-opacity="0.6" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32">Semantic-first, from an 800px wall of fields to a labeled inspector.</text>
  <!-- stylized right-rail inspector mock -->
  <g transform="translate(1120,120)">
    <rect x="0" y="0" width="360" height="760" fill="#161616" stroke="#ffffff" stroke-opacity="0.12"/>
    <!-- Identity group (pinned) -->
    <rect x="24" y="32" width="140" height="16" fill="#c8ff2d" fill-opacity="0.85"/>
    <rect x="24" y="72" width="312" height="56" fill="#1e1e1e" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="24" y="140" width="312" height="56" fill="#1e1e1e" stroke="#ffffff" stroke-opacity="0.1"/>
    <line x1="24" y1="228" x2="336" y2="228" stroke="#ffffff" stroke-opacity="0.1"/>
    <!-- grouped sections -->
    <g fill="#f5f3ef" fill-opacity="0.35">
      <rect x="24" y="256" width="110" height="12"/>
      <rect x="24" y="292" width="312" height="40" fill="#1a1a1a"/>
      <rect x="24" y="352" width="90" height="12"/>
      <rect x="24" y="388" width="312" height="40" fill="#1a1a1a"/>
      <rect x="24" y="448" width="120" height="12"/>
      <rect x="24" y="484" width="312" height="40" fill="#1a1a1a"/>
      <rect x="24" y="544" width="80" height="12"/>
      <rect x="24" y="580" width="312" height="40" fill="#1a1a1a"/>
    </g>
  </g>
</svg>
